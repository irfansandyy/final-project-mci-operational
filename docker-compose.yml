

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.2
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/${POSTGRES_DB:-airflow}
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/${POSTGRES_DB:-airflow}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'False'
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
    CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse123}
    _PIP_ADDITIONAL_REQUIREMENTS: pandas scikit-learn clickhouse-driver numpy gdown
  volumes:
    - ./dags:/opt/airflow/dags
    - ./DustiniaDelixia_Groceria:/opt/airflow/DustiniaDelixia_Groceria
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-airflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-airflow}
      - POSTGRES_DB=${POSTGRES_DB:-airflow}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}"]
      interval: 5s
      retries: 5
    # Database port exposed only locally for debugging if needed, but not required
    ports:
      - "127.0.0.1:5432:5432"

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_WWW_USER_PASSWORD:-admin}

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  clickhouse:
    image: clickhouse/clickhouse-server
    restart: always
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse123}
    # Ports removed to prevent external access, ensuring strict Docker bridge network isolation
    volumes:
      - clickhouse_data_vol:/var/lib/clickhouse
      - ./clickhouse_ddl.sql:/docker-entrypoint-initdb.d/01_clickhouse_ddl.sql
      - ./clickhouse_users.sql:/docker-entrypoint-initdb.d/02_clickhouse_users.sql
      - ./access_management.xml:/etc/clickhouse-server/users.d/access_management.xml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - MB_DB_TYPE=h2
    volumes:
      - metabase_data_vol:/metabase-data
    depends_on:
      clickhouse:
        condition: service_healthy

  jupyter-notebook:
    image: quay.io/jupyter/datascience-notebook:latest
    restart: always
    ports:
      - "127.0.0.1:8888:8888"
    environment:
      - JUPYTER_TOKEN=${JUPYTER_SECURE_TOKEN:-SecureToken123}
    command: "start-notebook.sh --ServerApp.terminals_enabled=False"
    volumes:
      - jupyter_data:/home/jovyan/work
      - ./DustiniaDelixia_Groceria:/home/jovyan/work/raw_data:ro

volumes:
  clickhouse_data_vol:
  metabase_data_vol:
  jupyter_data:
